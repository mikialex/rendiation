[package]
authors = ["mikialex <18516340862@163.com>"]
edition = "2018"
name = "nyxt-core"
version = "0.1.0"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
rendiation-ral = {path = "../../ral"}

wasm-bindgen = {version = "0.2.68"}

rendiation-webgl = {path = "../../webgl"}

arena = {path = "../../utils/arena"}

[dependencies.web-sys]
features = [
  'Document',
  'Element',
  'HtmlCanvasElement',
  'Window',
]
version = "0.3.39"
