[package]
authors = ["mikialex <miikiialexx@gmail.com>"]
edition = "2021"
name = "rendiation-parametric-rendering"
version = "0.1.0"

[dependencies]
rendiation-algebra = { path = "../../math/algebra" }
rendiation-geometry = { path = "../../math/geometry" }
rendiation-mesh-generator = { path = "../../content/mesh/generator" }
rendiation-shader-api = { path = "../../shader/api" }
rendiation-shader-derives = { path = "../../shader/derive" }
rendiation-step-reader = { path = "../step-reader" }
rendiation-webgpu = { path = "../../platform/graphics/webgpu" }
gltf-json = { version = "1.4.1", features = ["names", "extras", "extensions", "KHR_materials_unlit"] }
serde_json = "1"
spade = "2.15.1"

[dev-dependencies]
pollster = { workspace = true }

[lints]
workspace = true
